name: 🐞 Issue report
description: Report an issue in UMA
labels: [Bug]
body:

  - type: input
    id: component
    attributes:
      label: Source name
      description: |
        You can find the extension name and version in source settings.
      placeholder: |
        Example: "Not Real Scans"
    validations:
      required: true

  - type: input
    id: language
    attributes:
      label: Source language
      placeholder: |
        Example: "English"
    validations:
      required: true

  - type: textarea
    id: reproduce-steps
    attributes:
      label: Steps to reproduce
      description: Provide an example of the issue.
      placeholder: |
        Example:
          1. First step
          2. Second step
          3. Issue here
    validations:
      required: true

  - type: textarea
    id: error-logs
    attributes:
      label: Error logs or stack trace
      description: |
        If applicable, paste any error messages or stack traces.
      placeholder: |
        Paste error output here...

  - type: input
    id: app-version
    attributes:
      label: Usagi / Kotatsu fork version
      description: |
        You can find your Mihon/Mihon fork version number in **About**.
      placeholder: |
        Example: "App 0.0.1v"
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android version
      description: |
        You can find this somewhere in your Android settings.
      placeholder: |
        Example: "Android 11"
    validations:
      required: true

  - type: textarea
    id: other-details
    attributes:
      label: Other details
      placeholder: |
        Additional details and attachments.

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      description: Your issue will be closed if you haven't done these steps.
      options:
        - label: I have searched [existing issues](https://github.com/InvalidDavid/UMA/issues) both open & closed, and confirm that this is a new unreported issue.
          required: true
        - label: I have written a short but informative title.
          required: true
        - label: I have updated the app to to the latest version.
          required: true
        - label: I have provided clear steps to reproduce the issue.
          required: true
        - label: I have included relevant error logs or stack traces.
          required: true
        - label: I will correctly fill out all of the requested information in this form.
          required: true

  - type: textarea
    attributes:
      label: <!-- footer -->
      description: Do **not** modify. This is a reminder for other users to vote.
      value: |
        ---

        Add a :+1: [reaction] to [issues you find important].

        [reaction]: https://github.blog/2016-03-10-add-reactions-to-pull-requests-issues-and-comments/
        [issues you find important]: https://github.com/InvalidDavid/UMA/issues?q=is%3Aissue+is%3Aopen+sort%3Areactions-%2B1-desc
